<div class="main-container">
  <!-- Sidebar Navigation -->
  <aside class="sidebar" [class.collapsed]="!sidebarOpen">
    <div class="logo-section">
      <div class="logo">
        <img src="/logo.png" alt="Quiz App Logo" class="sidebar-logo-img" />
      </div>
      <h2 *ngIf="sidebarOpen">Quiz App</h2>
    </div>

     <nav class="nav-menu">
      <button
        class="nav-item"
        routerLink="/dashboard"
        routerLinkActive="active">
        <span class="icon">🏠</span>
        <span *ngIf="sidebarOpen">Dashboard</span>
      </button>

      <button
        class="nav-item"
        routerLink="/subjects"
        routerLinkActive="active">
        <span class="icon">📖</span>
        <span *ngIf="sidebarOpen">Subjects</span>
      </button>

      <button
        class="nav-item"
        routerLink="/quizzes"
        routerLinkActive="active">
        <span class="icon">✏️</span>
        <span *ngIf="sidebarOpen">My Quizzes</span>
      </button>

      <button
        class="nav-item"
        routerLink="/results"
        routerLinkActive="active">
        <span class="icon">📊</span>
        <span *ngIf="sidebarOpen">Results</span>
      </button>

      <button
        class="nav-item"
        routerLink="/profile/edit"
        routerLinkActive="active">
        <span class="icon">👤</span>
        <span *ngIf="sidebarOpen">Profile</span>
      </button>
    </nav>

    <div class="nav-divider"></div>

    <div class="user-section" *ngIf="sidebarOpen">
      <div class="user-avatar">{{ user?.name?.charAt(0) || 'U' }}</div>
      <div class="user-info">
        <p class="user-name">{{ user?.name }}</p>
        <p class="user-role">{{ user?.role | titlecase }}</p>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <div class="top-bar">
      <button class="toggle-sidebar" (click)="toggleSidebar()">
        <span>☰</span>
      </button>
      <div class="spacer"></div>
      <button class="logout-btn" (click)="logout()">🚪 Logout</button>
    </div>

    <!-- Page Content -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
