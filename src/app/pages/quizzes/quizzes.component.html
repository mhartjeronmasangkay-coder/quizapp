<div class="quizzes-container">
  <div class="page-header">
    <h1>✏️ My Quizzes</h1>
    <p>Take a quiz to test your knowledge</p>
  </div>

  <div class="quizzes-list">
    <div class="quiz-item" *ngFor="let quiz of quizzes">
      <div class="quiz-info">
        <h3>{{ quiz.title }}</h3>
        <div class="quiz-meta">
          <span class="difficulty" [class]="getDifficultyColor(quiz.difficulty)">{{ quiz.difficulty }}</span>
          <span class="questions">{{ quiz.questions }} questions</span>
          <span class="duration">⏱️ {{ quiz.duration }}</span>
        </div>
      </div>
      <div class="quiz-actions">
        <button class="start-btn">Start Quiz</button>
        <button class="pdf-btn" (click)="generateQuizPDF(quiz)" [disabled]="generatingPdfId === quiz.id">
          {{ generatingPdfId === quiz.id ? 'Generating...' : '📄 PDF' }}
        </button>
      </div>
    </div>
  </div>
</div>
